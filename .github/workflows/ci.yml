name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check
        run: cargo check --all-features
      
      - name: Test
        run: cargo test --all-features
      
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
      
      - name: Format
        run: cargo fmt --all -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu, armv7-unknown-linux-gnueabihf]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install cross-compilation tools for ARM
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-arm64-cross libc6-dev-arm64-cross
          elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libc6-armhf-cross libc6-dev-armhf-cross
          fi
      
      - name: Build
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            cargo build --release --target ${{ matrix.target }} --features frontend-embedded
          else
            if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
              export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            elif [[ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]]; then
              export CC_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc
              export CXX_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-g++
              export AR_armv7_unknown_linux_gnueabihf=arm-linux-gnueabihf-ar
              export CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc
            fi
            cargo build --release --target ${{ matrix.target }} --features frontend-embedded
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ippi-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ippi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      
      - name: Build
        run: npm run build
        working-directory: frontend
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: frontend/dist/

  pi-zero:
    name: Raspberry Pi Zero
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Add ARMv6 target
        run: rustup target add arm-unknown-linux-gnueabihf
      
      - name: Install ARMv6 cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            libc6-armhf-cross \
            libc6-dev-armhf-cross
      
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-armv6-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build for ARMv6
        env:
          CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_arm_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
        run: cargo build --release --target arm-unknown-linux-gnueabihf --features frontend-embedded
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ippi-armv6
          path: target/arm-unknown-linux-gnueabihf/release/ippi

