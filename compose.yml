version: '3.8'

services:
  ippi:
    build: .
    image: ippi/ippi:latest
    container_name: ippi
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/etc/ippi:ro
      - /dev/kvm:/dev/kvm
      - /dev/usb:/dev/usb
      - /dev/input:/dev/input
    devices:
      - /dev/kvm
      - /dev/video0
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RAWIO
    privileged: true
    networks:
      - ippi-network

  # Optional: PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    container_name: ippi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ippi
      POSTGRES_USER: ippi
      POSTGRES_PASSWORD: ippi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ippi-network

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: ippi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ippi-network

networks:
  ippi-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data: